<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me la Juego por Iván Cepeda</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(160deg, #0e0626 0%, #1a0a3e 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
  font-family: Arial, sans-serif;
}

/* Cabecera */
.header {
  width: 100%;
  max-width: 600px;
  text-align: center;
  margin-bottom: 22px;
}
.header h1 {
  color: #fff;
  font-size: clamp(1.1rem, 4vw, 1.5rem);
  font-weight: bold;
  letter-spacing: 0.5px;
}
.header p {
  color: #bbb;
  font-size: clamp(0.78rem, 3vw, 0.92rem);
  margin-top: 4px;
}

/* Tarjeta contenedora */
.card {
  width: 100%;
  max-width: 600px;
  background: #1c0d3a;
  border-radius: 20px;
  padding: 20px 18px 24px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.55);
}

.label {
  color: #ddd;
  font-size: clamp(0.85rem, 3vw, 0.95rem);
  font-weight: bold;
  margin-bottom: 8px;
}

.name-input {
  width: 100%;
  padding: clamp(11px, 3vw, 15px) 18px;
  border: 2.5px solid #6a0dad;
  border-radius: 12px;
  font-size: clamp(1rem, 4vw, 1.2rem);
  text-align: center;
  color: #222;
  outline: none;
  margin-bottom: 14px;
  background: #fff;
  font-family: Arial, sans-serif;
  transition: border-color 0.2s;
}
.name-input:focus { border-color: #e87c1e; }

.color-label {
  color: #bbb;
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  margin-bottom: 8px;
}

.color-palette {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.2); }
.color-swatch.active {
  border-color: #fff !important;
  transform: scale(1.25);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.5);
}

.canvas-wrap {
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  margin-bottom: 16px;
}
canvas { width: 100%; height: auto; display: block; }

.btn {
  width: 100%;
  padding: clamp(14px, 4vw, 17px);
  background: linear-gradient(135deg, #7b1fd4, #3b0962);
  color: white;
  border: none;
  border-radius: 13px;
  font-family: Arial, sans-serif;
  font-size: clamp(0.95rem, 3.5vw, 1.1rem);
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 16px rgba(106,13,173,0.45);
  transition: opacity 0.2s, transform 0.15s;
}
.btn:hover { opacity: 0.92; transform: translateY(-1px); }
.btn:active { opacity: 0.82; transform: scale(0.98); }

/* Footer */
.footer {
  margin-top: 20px;
  color: rgba(255,255,255,0.35);
  font-size: 0.72rem;
  text-align: center;
}

/* Responsive tablet / desktop */
@media (min-width: 640px) {
  .card { padding: 28px 28px 32px; }
  .color-swatch { width: 30px; height: 30px; }
}
@media (min-width: 1024px) {
  body { padding: 40px 24px 60px; }
  .card { max-width: 620px; }
}
</style>
</head>

<div class="header">

const IW=800, IH=999;
const BX1=83, BY1=510, BX2=741, BY2=676;
const BW=BX2-BX1, BH=BY2-BY1;
const ANGLE = -2.0 * Math.PI / 180;

const COLORS = [
  {hex:'#3b0962', label:'Morado'},
  {hex:'#c0392b', label:'Rojo'},
  {hex:'#e67e22', label:'Naranja'},
  {hex:'#1e8449', label:'Verde'},
  {hex:'#1a5276', label:'Azul'},
  {hex:'#b7950b', label:'Dorado'},
  {hex:'#111111', label:'Negro'},
  {hex:'#ffffff', label:'Blanco'},
];
let selectedColor = '#3b0962';

const palette = document.getElementById('palette');
COLORS.forEach((c,i) => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (i===0?' active':'');
  sw.style.background = c.hex;
  if(c.hex==='#ffffff') sw.style.border='2.5px solid #999';
  sw.title = c.label;
  sw.onclick = () => {
    document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    selectedColor = c.hex;
    drawCard(document.getElementById('nameInput').value);
  };
  palette.appendChild(sw);
});

const canvas = document.getElementById('card');
const ctx = canvas.getContext('2d');
const input = document.getElementById('nameInput');
canvas.width=IW; canvas.height=IH;

let useFont = 'Impact, "Arial Black", Arial';
const bgImg = new Image();

// Intentar cargar Lilita One (si hay internet)
const lnk = document.createElement('link');
lnk.rel='stylesheet';
lnk.href='https://fonts.googleapis.com/css2?family=Lilita+One&display=swap';
document.head.appendChild(lnk);

bgImg.onload = () => {
  setTimeout(() => {
    document.fonts.load('60px "Lilita One"')
      .then(() => { useFont = '"Lilita One", Impact, "Arial Black"'; })
      .finally(() => drawCard(input.value));
  }, 400);
};
bgImg.src = IMG_B64;

function drawCard(nombre) {
  ctx.drawImage(bgImg, 0, 0, IW, IH);
  const name = nombre.trim();
  if (!name) return;

  const cx = BX1 + BW/2;
  const cy = BY1 + BH/2;
  const maxW = BW * 0.84;
  const maxH = BH * 0.80;

  let fontSize = 160;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  do {
    fontSize -= 2;
    ctx.font = fontSize + 'px ' + useFont;
  } while ((ctx.measureText(name).width > maxW || fontSize > maxH) && fontSize > 24);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ANGLE);

  // Contorno blanco
  ctx.strokeStyle = 'rgba(255,255,255,0.88)';
  ctx.lineWidth = Math.max(fontSize * 0.09, 5);
  ctx.lineJoin = 'round';
  ctx.font = fontSize + 'px ' + useFont;
  ctx.strokeText(name, 0, 2);

  // Sombra + relleno
  ctx.shadowColor = 'rgba(0,0,0,0.28)';
  ctx.shadowOffsetX=3; ctx.shadowOffsetY=4; ctx.shadowBlur=8;
  ctx.fillStyle = selectedColor;
  ctx.fillText(name, 0, 2);

  ctx.shadowColor='transparent'; ctx.restore();
}

input.addEventListener('input', ()=>drawCard(input.value));

function downloadImg() {
  drawCard(input.value);
  const nombre = input.value.trim() || 'mi-imagen';
  const a = document.createElement('a');
  a.download = 'me-la-juego-'+nombre+'.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
